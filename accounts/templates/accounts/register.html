{% extends 'store/base.html' %}

{% block title %}
Kayıt Ol | Lares Home
{% endblock %}

{% block content %}

<main class="max-w-xl mx-auto px-6 py-20">

    <div class="bg-white rounded-3xl p-10 shadow-sm">

        <h1 class="text-4xl font-bold mb-8">
            Kayıt Ol
        </h1>

        <form method="POST">

            {% csrf_token %}

            <input type="text"
                   name="username"
                   placeholder="Kullanıcı Adı"
                   class="w-full border rounded-xl p-4 mb-4"
                   required>

            <input type="email"
                   name="email"
                   placeholder="Email"
                   class="w-full border rounded-xl p-4 mb-4"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Şifre"
                   class="w-full border rounded-xl p-4 mb-6"
                   required>

            <button class="bg-black text-white px-8 py-4 rounded-full w-full">
                Kayıt Ol
            </button>

        </form>

    </div>

</main>

{% endblock %}
