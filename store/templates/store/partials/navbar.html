{% load static %}

<nav class="fixed top-0 left-0 w-full z-50">

    <div class="max-w-7xl mx-auto px-6 pt-4">

        <div class="bg-white/70 backdrop-blur-2xl border border-white/40 shadow-[0_8px_28px_rgba(0,0,0,0.06)] rounded-full px-7 h-16 flex items-center justify-between">

            <!-- LOGO -->
            <a href="/" class="flex items-center shrink-0">
                <img src="{% static 'store/images/lares-logo.png' %}"
                     class="h-10 w-auto object-contain opacity-95">
            </a>

            <!-- MENU -->
            <div class="hidden lg:flex items-center gap-8">

                <a href="/"
                   class="text-[15px] font-medium text-neutral-900 hover:text-[#c6a46c] transition duration-300">
                    Ana Sayfa
                </a>

                <a href="/#products"
                   class="text-[15px] font-medium text-neutral-700 hover:text-[#c6a46c] transition duration-300">
                    Ürünler
                </a>

                <a href="/#products"
                   class="text-[15px] font-medium text-neutral-700 hover:text-[#c6a46c] transition duration-300">
                    Kategoriler
                </a>

                <a href="#"
                   class="text-[15px] font-medium text-neutral-700 hover:text-[#c6a46c] transition duration-300">
                    Hakkımızda
                </a>

                <a href="{% url 'contact' %}"
                   class="text-[15px] font-medium text-neutral-700 hover:text-[#c6a46c] transition duration-300">
                    İletişim
                </a>

            </div>

            <!-- RIGHT -->
            <div class="flex items-center gap-5">

                {% if user.is_authenticated %}

                    <a href="{% url 'my_orders' %}"
                       class="hidden md:block text-sm text-neutral-700 hover:text-[#c6a46c] transition">
                        Siparişlerim
                    </a>

                    <a href="{% url 'logout' %}"
                       class="text-sm text-neutral-700 hover:text-[#c6a46c] transition">
                        Çıkış
                    </a>

                {% else %}

                    <a href="{% url 'login' %}"
                       class="text-sm text-neutral-700 hover:text-[#c6a46c] transition">
                        Giriş
                    </a>

                {% endif %}

                <!-- CART -->
                <a href="{% url 'cart' %}"
                   class="relative w-10 h-10 rounded-full bg-black text-white flex items-center justify-center text-base hover:bg-[#a88a5b] transition duration-500">

                    🛒

                    <span class="absolute -top-1 -right-1 bg-[#c6a46c] text-white text-[11px] w-5 h-5 rounded-full flex items-center justify-center font-medium">
                        {{ cart_count|default:0 }}
                    </span>

                </a>

            </div>

        </div>

    </div>

</nav>
