{% load static %}

<nav class="fixed top-0 left-0 w-full z-50 bg-[#111111] text-white border-b border-white/10">
    <div class="max-w-7xl mx-auto px-8 h-24 flex items-center justify-between">

        <a href="/" class="flex items-center">
